name: Deploy
run-name: "Deploy (${{ inputs.ref }})"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      # I experimented with caching the Nix store but it brought a performance penalty rather than benefit

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Build
        run: |
          nix develop --command bash -c "
            pnpm install --frozen-lockfile
            pnpm build
          "

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        # No --delete on purpose: assets are content-hashed, and a client that
        # was offline across a deploy still requests the old chunk names from
        # its cached index.html until the service worker updates. Leaving stale
        # hashed assets in place keeps those clients working; the trade-off is
        # that old files accumulate on the server and must be pruned manually.
        run: |
          rsync -crvz ./dist/ ${{ secrets.DEPLOY_URL }}
